<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Thème avant le premier paint : évite le flash light → dark (aligné avec src/lib/theme-preference.ts) -->
    <script>
      (function () {
        try {
          var k = 'quest-theme';
          var stored = localStorage.getItem(k);
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          if (stored === 'dark') {
            root.classList.add('dark');
          } else if (stored === 'light') {
            root.classList.add('light');
          } else {
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
              root.classList.add('dark');
            } else {
              root.classList.add('light');
            }
          }
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Quest | Master Your Journey</title>
    <meta name="description" content="Quest helps you balance the 5 essential pillars of a fulfilling life." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
